<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 780" width="1000" height="780">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0220"/>
    </linearGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a3d"/>
      <stop offset="100%" style="stop-color:#151018"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky)"/>
  <!-- Oval speedway hint -->
  <ellipse cx="500" cy="390" rx="460" ry="320" fill="none" stroke="#3d2a55" stroke-width="8" opacity="0.6"/>
  <ellipse cx="500" cy="390" rx="380" ry="250" fill="url(#track)" stroke="#ff2dbe" stroke-width="2" opacity="0.35"/>
  <!-- Infield "grass" -->
  <ellipse cx="500" cy="400" rx="300" ry="200" fill="#0f2818" stroke="#39ff14" stroke-width="1" opacity="0.5"/>
  <!-- Main stages / areas (schematic, not to scale) -->
  <g font-family="Segoe UI, system-ui, sans-serif" fill="#eae0ff" font-size="13" text-anchor="middle">
    <circle cx="500" cy="320" r="55" fill="#2a1040" stroke="#ff2dbe" stroke-width="3" filter="url(#glow)"/>
    <text x="500" y="315" font-size="15" font-weight="700" fill="#ff6fe0">kineticFIELD</text>
    <text x="500" y="335" font-size="11" fill="#cbb8ff">main stage</text>
    <circle cx="320" cy="420" r="42" fill="#1a2048" stroke="#00f5ff" stroke-width="2"/>
    <text x="320" y="415" font-size="12" font-weight="700" fill="#7afcff">circuitGROUNDS</text>
    <text x="320" y="432" font-size="10" fill="#9ecfff">techno</text>
    <circle cx="680" cy="420" r="42" fill="#201828" stroke="#ffd400" stroke-width="2"/>
    <text x="680" y="415" font-size="12" font-weight="700" fill="#ffe566">bassPOD</text>
    <text x="680" y="432" font-size="10" fill="#ffee99">bass</text>
    <rect x="430" y="460" width="140" height="70" rx="10" fill="#182018" stroke="#39ff14" stroke-width="2"/>
    <text x="500" y="492" font-size="12" font-weight="700" fill="#7dff9a">neonGARDEN</text>
    <text x="500" y="510" font-size="10" fill="#b8ffc9">house / disco</text>
    <polygon points="500,540 420,640 580,640" fill="#281a08" stroke="#ff8c00" stroke-width="2"/>
    <text x="500" y="615" font-size="11" font-weight="700" fill="#ffb347">wasteLAND</text>
    <rect x="60" y="280" width="100" height="50" rx="8" fill="#120828" stroke="#c86bff" stroke-width="2"/>
    <text x="110" y="310" font-size="11" fill="#e0b0ff">cosmicMEADOW</text>
    <rect x="840" y="280" width="100" height="50" rx="8" fill="#120828" stroke="#c86bff" stroke-width="2"/>
    <text x="890" y="310" font-size="11" fill="#e0b0ff">stereoBLOOM</text>
    <text x="500" y="720" font-size="11" fill="#6a5a8a">EDC Las Vegas · LVMS infield (illustrative map · not official)</text>
  </g>
</svg>
